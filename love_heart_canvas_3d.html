
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Canvas 3D Heart</title>
<style>
html,body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:black;
}
canvas{
    display:block;
}
</style>
</head>
<body>
<canvas id="c"></canvas>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

function resize(){
    canvas.width = innerWidth;
    canvas.height = innerHeight;
}
resize();
addEventListener("resize", resize);

const points = [];
const text = "I love you";

for(let layer=0; layer<18; layer++){
    const z = (layer - 9) * 12;

    for(let t=0; t<Math.PI*2; t+=0.12){
        const x = 16*Math.pow(Math.sin(t),3);
        const y = -(13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t));

        points.push({
            x:x*10,
            y:y*10,
            z:z,
            angle:t
        });
    }
}

let rot = 0;

function draw(){
    rot += 0.01;

    ctx.clearRect(0,0,canvas.width,canvas.height);

    const cx = canvas.width/2;
    const cy = canvas.height/2;

    const projected = [];

    for(const p of points){

        const x = p.x*Math.cos(rot) - p.z*Math.sin(rot);
        const z = p.x*Math.sin(rot) + p.z*Math.cos(rot);

        const depth = 500/(500+z);
        const sx = cx + x*depth*2;
        const sy = cy + p.y*depth*2;

        projected.push({
            sx, sy,
            scale: depth,
            z
        });
    }

    projected.sort((a,b)=>a.z-b.z);

    for(const p of projected){

        const size = Math.max(8, 14*p.scale);

        ctx.font = size + "px Arial";
        ctx.fillStyle = "#f3a0c2";

        ctx.shadowBlur = 12;
        ctx.shadowColor = "#ffd4e7";

        ctx.fillText(text, p.sx, p.sy);
    }

    requestAnimationFrame(draw);
}

draw();
</script>
</body>
</html>
